# See ../../schema/poc.schema.json and ../../SAFETY.md.
id: decrqss-reflection-2023
title: "DECRQSS status-request reflection (near-arbitrary input injection)"
class: decrqss-reflection
cve:
  - CVE-2022-45872   # iTerm2 < 3.4.18
  - CVE-2022-47583   # mintty < 3.6.3
  - CVE-2022-23465   # SwiftTerm
affected:
  - product: iTerm2
    versions_fixed: "3.4.18"
    tested: false
  - product: mintty
    versions_fixed: "3.6.3"
    tested: false
  - product: SwiftTerm
    tested: false
author: "David Leadbeater"
source_url: "https://dgl.cx/2023/09/ansi-terminal-security"
archive_url: "http://web.archive.org/web/20260617084902/https://dgl.cx/2023/09/ansi-terminal-security"
date: "2023-09"
severity: rce
mechanism: decrqss-reflection
references:
  - "https://nvd.nist.gov/vuln/detail/CVE-2022-45872"
  - "DEF CON 31: Terminally Owned -- 60 Years of Escaping (https://www.youtube.com/watch?v=Y4A7KMQEmfo)"
payload_encoding: hex
expected_effect: >-
  A vulnerable terminal, on a DECRQSS status request (ESC P $ q ... ESC \\), echoes
  a response that near-verbatim reflects the request content back into the shell's
  input stream. This gives an attacker near-arbitrary input injection; a following
  newline (or the user pressing Enter) executes it. Leadbeater's 2023 primitive that
  re-broke a 2008 xterm bug across iTerm2, mintty and SwiftTerm.
canary: "POC-CORPUS-CANARY-FIRED"
modified: true
original_ref: >-
  Upstream PoC injects an arbitrary attacker command via the reflected DECRQSS
  response. Here the request carries a SAFE canary command that only writes the
  canary marker file, so a fired payload cannot harm the tester. See
  dgl.cx/2023/09/ansi-terminal-security for the unmodified technique.
notes: >-
  Same reflection primitive as the 2003 title-report class, modernised. Related
  echoback CVEs: OSC 50 font-query (CVE-2022-45063 xterm, CVE-2023-39726 mintty),
  Windows Terminal OSC 9;9 (CVE-2022-44702).
